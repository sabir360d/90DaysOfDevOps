apiVersion: v1
kind: Pod
metadata:
  name: startup-demo
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - sleep 20; touch /tmp/started; sleep 300
    startupProbe:
      exec:
        command:
        - cat
        - /tmp/started
      periodSeconds: 5
      failureThreshold: 12 # Gives the app 60 seconds (5s * 12) to start
    livenessProbe:
      exec:
        command:
        - cat
        - /tmp/started
      periodSeconds: 5

