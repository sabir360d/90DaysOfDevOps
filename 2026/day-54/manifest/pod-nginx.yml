apiVersion: v1
kind: Pod
metadata:
  name: nginx-config-pod
spec:
  containers:
    - name: nginx-container
      image: nginx
      ports:
        - containerPort: 80
      volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d  # This is where Nginx reads .conf files
  volumes:
    - name: config-volume
      configMap:
        name: nginx-config  # The ConfigMap you created in Task 2

