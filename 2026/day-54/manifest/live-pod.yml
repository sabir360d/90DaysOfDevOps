apiVersion: v1
kind: Pod
metadata:
  name: live-config-pod
spec:
  containers:
    - name: busybox
      image: busybox
      # The 'echo' ensures the output isn't hidden by buffering
      command: ["sh", "-c", "while true; do cat /config/message; echo ''; sleep 5; done"]
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: live-config
