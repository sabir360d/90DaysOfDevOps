---
# -------------------------
# WEB SERVERS
# -------------------------
- name: Configure web servers
  hosts: web
  become: true

  roles:
    - role: webserver
      vars:
        app_name: terraweek
        http_port: 80

# -------------------------
# APP SERVERS
# -------------------------
- name: Configure app servers with Docker
  hosts: app
  become: true
  vars:
    docker_add_repo: false
    docker_packages:
      - docker
    docker_install_compose_plugin: false
  roles:
    - geerlingguy.docker

# -------------------------
# DB SERVERS
# -------------------------
- name: Configure database servers
  hosts: db
  become: true

  tasks:
    - name: Create DB config file with secrets
      template:
        src: templates/db-config.j2
        dest: /etc/db-config.env
        owner: root
        mode: '0600'
