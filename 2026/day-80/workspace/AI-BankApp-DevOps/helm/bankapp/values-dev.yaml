bankapp:
  replicaCount: 1
  image:
    repository: trainwithshubham/ai-bankapp-eks
    tag: "latest"
    pullPolicy: Always
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "150m"
  autoscaling:
    enabled: false

mysql:
  enabled: true
  model: tinyllama
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "100m"
  persistence:
    size: "2Gi"
    enabled: false
    storageClass: "standard" 

ollama:
  enabled: true 
  model: tinyllama
  resources:
    requests:
      memory: "1Gi"
      cpu: "300m"
    limits:
      memory: "1.5Gi"
      cpu: "500m"
  persistence:
    size: 1Gi
    storageClass: standard


storageClass:
  create: false
